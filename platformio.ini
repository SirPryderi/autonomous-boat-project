; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[platformio]
default_envs = esp32
extra_configs = secrets.ini

[common]
framework = arduino
lib_deps =
    adafruit/Adafruit GFX Library@^1.12.1
    adafruit/Adafruit SSD1306@^2.5.15
    adafruit/DHT sensor library@^1.4.7
    adafruit/Adafruit INA219@^1.2.3
    bmellink/IBusBM@^1.1.4
    ; Other shared libraries

[env:esp32]
platform = espressif32
board = esp32dev
framework = ${common.framework}
lib_deps = ${common.lib_deps}
monitor_speed = 115200
upload_speed = 921600
build_flags = 
    -D ESP32_BUILD
    -D SERIAL_SPEED=115200
    -D SCREEN_WIDTH=128
    -D SCREEN_HEIGHT=64
    -D OLED_RESET=-1
    -D SCREEN_ADDRESS=0x3C
    -D PIN_SDA=27
    -D PIN_SCL=14
    -D PIN_LED=02
    -D PIN_BUZZER=25
    -D PIN_TEMP_SENSOR=26
    -D PIN_MOTOR_STBY=19
    -D PIN_MOTOR_A_IN1=21
    -D PIN_MOTOR_A_IN2=22
    -D PIN_MOTOR_A_PWM=23
    -D PIN_MOTOR_B_IN1=18
    -D PIN_MOTOR_B_IN2=05
    -D PIN_MOTOR_B_PWM=04
    ${secrets.build_flags}

[env:esp32-ota]
extends = env:esp32
upload_protocol = espota
upload_port = ${secrets.ota_hostname}
upload_flags =
    --auth=${secrets.ota_password}
    --host_port=55910

[env:uno]
platform = atmelavr
board = uno
framework = ${common.framework}
lib_deps = ${common.lib_deps}
monitor_speed = 9600
upload_speed = 115200
build_flags = 
    -D ARDUINO_UNO_BUILD
    -D SERIAL_SPEED=9600
    -D PIN_LED=13
    -D PIN_BUZZER=12